<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Auto New Tab</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="popup">
  <main class="wrap">
  <p id="status" class="status">&hellip;</p>
  <label class="toggle-row" id="site-row" hidden>
    <span class="toggle-text">
      <span>Open Links in New Tab on</span>
      <code id="site-path"></code>
    </span>
    <input type="checkbox" id="site-toggle" class="switch">
  </label>
  <button id="open-options" type="button" class="secondary">All Settings</button>
  <p class="hint version" id="version"></p>
  </main>
  <script src="common.js"></script>
  <script src="popup.js"></script>
</body>
</html>
