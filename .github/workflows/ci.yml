name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate manifest.json
        run: python3 -m json.tool auto-new-tab/manifest.json > /dev/null

      - name: Check JavaScript syntax
        run: |
          for f in auto-new-tab/*.js auto-new-tab/test/*.js; do
            node --check "$f"
          done

      - name: Run unit tests
        run: node auto-new-tab/test/run-tests.js

      - name: Build extension zip
        run: ./auto-new-tab/pack.sh

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: auto-new-tab
          path: auto-new-tab/dist/auto-new-tab.zip
